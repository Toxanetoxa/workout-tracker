services:
  api:
    build: .
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DOCKER_DATABASE_URL}
    ports:
      - "${HTTP_PORT}:3000"

  postgres:
    image: postgres:16-alpine
    command: ["postgres", "-c", "timezone=UTC"]
    environment:
      TZ: UTC
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    image: migrate/migrate:v4.17.1
    profiles: ["tools"]
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations:ro
    command:
      [
        "-path",
        "/migrations",
        "-database",
        "${DOCKER_DATABASE_URL}",
        "up"
      ]

  seed:
    image: postgres:16-alpine
    profiles: ["tools"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      TZ: UTC
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./seeds:/seeds:ro
    command:
      [
        "psql",
        "-h",
        "postgres",
        "-U",
        "${POSTGRES_USER}",
        "-d",
        "${POSTGRES_DB}",
        "-f",
        "/seeds/dev.sql"
      ]

volumes:
  postgres_data:
